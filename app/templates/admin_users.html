{% extends "base.html" %}
{% block content %}
  <div class="flex items-start justify-between gap-4 flex-wrap">
    <div>
      <h1 class="text-xl font-semibold">用户管理</h1>
      <p class="text-sm text-slate-600 mt-1">内部账号。建议仅创建必要用户。</p>
    </div>
    <a class="text-sm px-3 py-2 rounded border bg-white hover:bg-slate-50" href="/admin/users/new">新建用户</a>
  </div>

  <div class="mt-5 bg-white border rounded overflow-hidden">
    <div class="grid grid-cols-12 gap-2 px-4 py-2 text-xs text-slate-500 border-b bg-slate-50">
      <div class="col-span-4">用户名</div>
      <div class="col-span-2">管理员</div>
      <div class="col-span-3">创建时间</div>
      <div class="col-span-3">禁用</div>
    </div>
    {% for u in users %}
      <div class="grid grid-cols-12 gap-2 px-4 py-3 border-b">
        <div class="col-span-4 font-medium">{{ u.username }}</div>
        <div class="col-span-2 text-slate-700">{{ "是" if u.is_admin else "否" }}</div>
        <div class="col-span-3 text-slate-700">{{ u.created_at }}</div>
        <div class="col-span-3 text-slate-700">{{ u.disabled_at or "-" }}</div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
