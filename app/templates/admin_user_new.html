{% extends "base.html" %}
{% block content %}
  <h1 class="text-xl font-semibold">新建用户</h1>
  {% if error %}
    <div class="mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded p-3">{{ error }}</div>
  {% endif %}
  <form class="mt-5 bg-white border rounded p-4 space-y-3 max-w-lg" method="post" action="/admin/users/new">
    <div>
      <label class="block text-xs text-slate-600">用户名</label>
      <input class="mt-1 w-full px-3 py-2 border rounded" name="username" required />
    </div>
    <div>
      <label class="block text-xs text-slate-600">密码</label>
      <input class="mt-1 w-full px-3 py-2 border rounded" name="password" type="password" required />
    </div>
    <div class="flex items-center gap-2">
      <input id="is_admin" type="checkbox" name="is_admin" value="1" />
      <label for="is_admin" class="text-sm text-slate-700">管理员</label>
    </div>
    <button class="px-3 py-2 rounded bg-slate-900 text-white hover:bg-slate-800" type="submit">创建</button>
  </form>
{% endblock %}
