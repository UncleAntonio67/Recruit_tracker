<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "Recruit Tracker" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <a class="flex items-center gap-2" href="/jobs">
          <span class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm font-bold">JT</span>
          <span class="text-xl font-bold text-slate-800 tracking-tight">
            JobTracker <span class="text-blue-600">Pro</span>
          </span>
        </a>

        {% if user %}
          {% set p = request.url.path %}
          <nav class="hidden md:flex items-center gap-8">
            <a href="/jobs"
               class="py-5 text-sm font-medium transition-colors border-b-2 outline-none {% if p.startswith('/jobs') %}border-blue-600 text-blue-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
              找工作
            </a>
            <a href="/applications"
               class="py-5 text-sm font-medium transition-colors border-b-2 outline-none {% if p.startswith('/applications') %}border-blue-600 text-blue-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
              投递管理
            </a>
            <a href="/resume"
               class="py-5 text-sm font-medium transition-colors border-b-2 outline-none {% if p.startswith('/resume') %}border-blue-600 text-blue-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
              简历管理
            </a>
            <a href="/companies"
               class="py-5 text-sm font-medium transition-colors border-b-2 outline-none {% if p.startswith('/companies') %}border-blue-600 text-blue-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
              企业库维护
            </a>
            {% if user.is_admin %}
              <a href="/admin/sources"
                 class="py-5 text-sm font-medium transition-colors border-b-2 outline-none {% if p.startswith('/admin') %}border-blue-600 text-blue-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
                采集源
              </a>
            {% endif %}
          </nav>
        {% endif %}

        <div class="flex items-center gap-3">
          {% if user %}
            {% if user.is_admin %}
              <div class="text-sm text-slate-500 hidden sm:block">Admin 模式</div>
            {% endif %}
            <div class="w-9 h-9 bg-slate-200 rounded-full border-2 border-white shadow-sm flex items-center justify-center text-slate-600 text-xs font-bold">
              {{ (user.username[:2] or "ME") | upper }}
            </div>
            <form action="/logout" method="post">
              <button class="text-sm px-3 py-1.5 rounded border border-slate-200 bg-white hover:bg-slate-50" type="submit">退出</button>
            </form>
          {% endif %}
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
